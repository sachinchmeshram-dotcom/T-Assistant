kind = "mobile"
previewPath = "/mobile/"
title = "Gold Swing AI — Mobile"
version = "1.0.0"
id = "artifacts/gold-swing-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20893

[services.development]
run = "pnpm --filter @workspace/gold-swing-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gold-swing-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gold-swing-mobile", "run", "serve" ]

[services.env]
PORT = "20893"
BASE_PATH = "/mobile/"
